                { id: 'EMP-105', name: 'Ramesh Singh', role: 'Heavy Truck Driver', basicPay: 28000, pan: 'ERPSI1192Q', bank: 'Bank of Baroda - 2800109923', status: 'On Trip' }
            ],
            leaves: [
                { id: 'LV-701', empId: 'EMP-105', empName: 'Ramesh Singh', leaveType: 'Casual Leave (CL)', startDate: '2026-08-01', endDate: '2026-08-03', reason: 'Family function at home village', status: 'Approved', appliedOn: '2026-07-20' },
                { id: 'LV-702', empId: 'EMP-102', empName: 'Rajesh Patil', leaveType: 'Sick Leave (SL)', startDate: '2026-07-25', endDate: '2026-07-26', reason: 'Medical checkup', status: 'Pending', appliedOn: '2026-07-21' }
            ],
            vehicles: [
                { id: 'V01', regNo: 'MH-12-FE-8812', type: '32ft MXL Container Truck', odometer: 184200, status: 'In Transit', fuelCap: 350, insExpiry: '2027-01-15', fitExpiry: '2027-04-10' },
                { id: 'V02', regNo: 'MH-04-FE-9901', type: '40ft Flatbed Trailer', odometer: 210400, status: 'Available', fuelCap: 400, insExpiry: '2026-11-20', fitExpiry: '2027-02-05' },
                { id: 'V03', regNo: 'MH-43-FE-1022', type: '14ft Eicher City Truck', odometer: 94000, status: 'Maintenance', fuelCap: 160, insExpiry: '2026-09-10', fitExpiry: '2026-10-01' }
            ],
            trips: [
                { id: 'TRP-301', lrNo: 'FE-LR-9912', client: 'Mahindra Logistics Ltd', origin: 'Chakan, Pune', destination: 'Sriperumbudur, Chennai', vehicleId: 'V01', driverId: 'EMP-105', weight: 18.5, cargo: 'Automotive Engine Blocks', freight: 92000, advance: 30000, status: 'In Transit', date: '2026-07-20' },
                { id: 'TRP-300', lrNo: 'FE-LR-9911', client: 'Tata Motors Freight', origin: 'Bhiwandi, Mumbai', destination: 'Sanand, Gujarat', vehicleId: 'V02', driverId: 'EMP-105', weight: 14.0, cargo: 'Press Body Panels', freight: 68000, advance: 20000, status: 'Completed', date: '2026-07-15' }
            ],
            journals: [
                { id: 'JV-801', date: '2026-07-20', debitAcc: '5010 (Fuel Expense)', creditAcc: '1010 (Bank Account)', amount: 18500, narration: 'Diesel Refill at BPCL Kolhapur Highway for MH-12-FE-8812' }
            ],
            invoices: [
                { id: 'INV-2026-101', tripId: 'TRP-300', lrNo: 'FE-LR-9911', client: 'Tata Motors Freight', date: '2026-07-16', amount: 68000, gstRate: 12, total: 76160, status: 'Paid' }
            ],
            fuelLogs: [
                { id: 'FL-901', vehicleId: 'V01', date: '2026-07-20', liters: 200, rate: 92.5, total: 18500, pump: 'BPCL Expressway Station' }
            ]
        };

        let state = JSON.parse(localStorage.getItem('friendship_express_erp_v5')) || defaultData;
        if (!state.leaves) state.leaves = defaultData.leaves;
        let currentUser = state.employees[0];
        let useCloudSync = false;
        let db = null;
        let auth = null;

        // OPTIONAL FIREBASE INITIALIZATION & AUTH
        try {
            const firebaseConfig = {
                apiKey: "",
                authDomain: "friendship-express-erp.firebaseapp.com",
                projectId: "friendship-express-erp",
                storageBucket: "friendship-express-erp.appspot.com",
                messagingSenderId: "1234567890",
                appId: "1:1234567890:web:123456"
            };

            if (firebaseConfig.apiKey && firebaseConfig.apiKey.length > 5) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                useCloudSync = true;
                document.getElementById('cloudStatusBadge').classList.remove('hidden');
            }
        } catch(e) {
            console.log("Running in LocalStorage mode.");
        }

        // INITIALIZATION
        window.addEventListener('DOMContentLoaded', () => {
            applyUserRolePermissions();
            renderDashboard();
            renderCustomerSuite();
            renderTrips();
            renderFleet();
            renderAccounting();
            renderInvoices();
            renderFuel();
            renderHR();
            renderPayroll();
            renderESS();
            renderProfitability();
            populateDropdowns();
            updateBadges();

            if (useCloudSync) {
                setupCloudRealtimeListeners();
            }

            window.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    openSearchModal();
                }
            });
        });

        // TOAST NOTIFICATIONS
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-slate-900 text-emerald-400 border-emerald-500/30' : 'bg-rose-900 text-rose-200 border-rose-500/30';
            const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';

            toast.className = `pointer-events-auto flex items-center gap-2 px-4 py-3 rounded-xl border shadow-2xl text-xs font-semibold ${bgClass} transition-all duration-300 transform translate-y-2 opacity-0`;
            toast.innerHTML = `<i class="fa-solid ${icon} text-base"></i><span>${message}</span>`;

            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 10);

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-2');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function setupCloudRealtimeListeners() {
            if (!db) return;

            db.collection('trips').onSnapshot(snapshot => {
                if (!snapshot.empty) {
                    state.trips = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderTrips();
                    renderDashboard();
                    renderProfitability();
                    updateBadges();
                }
            });

            db.collection('customers').onSnapshot(snapshot => {
                if (!snapshot.empty) {
                    state.customers = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderCustomerSuite();
                    populateDropdowns();
                }
            });

            db.collection('leaves').onSnapshot(snapshot => {
                if (!snapshot.empty) {
                    state.leaves = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderESS();
                }
            });
        }

        // USER AUTH & LOGIN
        function handleUserLogin(e) {
            e.preventDefault();
            const inputVal = document.getElementById('login_userid').value.trim();
            const found = state.employees.find(emp => emp.id.toLowerCase() === inputVal.toLowerCase() || emp.name.toLowerCase().includes(inputVal.toLowerCase()));

            if (found) {
                currentUser = found;
                updateActiveUserUI();
                closeModal('loginModal');
                showToast(`Welcome back, ${currentUser.name}! Signed in as ${currentUser.role}`);
            } else {
                showToast('Invalid User ID or Employee credentials', 'error');
            }
        }

        function quickLogin(empId) {
            const found = state.employees.find(e => e.id === empId);
            if (found) {
                currentUser = found;
                updateActiveUserUI();
                closeModal('loginModal');
                showToast(`Signed in as ${currentUser.name} (${currentUser.role})`);
            }
        }

        function updateActiveUserUI() {
            document.getElementById('activeUserName').innerText = currentUser.name;
            document.getElementById('activeUserRole').innerText = currentUser.role;
            applyUserRolePermissions();
            renderESS();
        }

        function applyUserRolePermissions() {
            const role = currentUser.role;
            const isHR = role.includes('HR') || role.includes('Admin');
            const isAcct = role.includes('Accountant') || role.includes('Admin');
            const isDispatch = role.includes('Dispatch') || role.includes('Admin');

            document.querySelectorAll('.role-hr').forEach(el => el.style.display = isHR ? 'inline-flex' : 'none');
            document.querySelectorAll('.role-acct').forEach(el => el.style.display = isAcct ? 'inline-flex' : 'none');
            document.querySelectorAll('.role-dispatch').forEach(el => el.style.display = isDispatch ? 'inline-flex' : 'none');
        }

        // EMPLOYEE SELF-SERVICE (ESS) RENDER & LOGIC
        function renderESS() {
            document.getElementById('ess-emp-id').innerText = currentUser.id;
            document.getElementById('ess-emp-name').innerText = currentUser.name;
            document.getElementById('ess-emp-role').innerText = currentUser.role;
            document.getElementById('ess-emp-pan').innerText = currentUser.pan || 'PAN NOT VERIFIED';
            document.getElementById('ess-emp-bank').innerText = currentUser.bank || 'Bank Account N/A';

            const isHRorAdmin = currentUser.role.includes('HR') || currentUser.role.includes('Admin');
            const userLeaves = isHRorAdmin ? state.leaves : state.leaves.filter(l => l.empId === currentUser.id);

            const body = document.getElementById('essLeaveTableBody');
            body.innerHTML = userLeaves.map(l => `
                <tr class="hover:bg-slate-50">
                    <td class="p-3.5 font-bold text-slate-900">${l.id}</td>
                    <td class="p-3.5 font-semibold text-slate-800">${l.empName}<div class="text-[10px] text-slate-400 font-mono">${l.empId}</div></td>
                    <td class="p-3.5"><span class="px-2 py-0.5 rounded text-[10px] font-bold bg-slate-100 text-slate-700">${l.leaveType}</span></td>
                    <td class="p-3.5 font-medium text-slate-900">${l.startDate} ➔ ${l.endDate}</td>
                    <td class="p-3.5 text-slate-600 max-w-xs truncate">${l.reason}</td>
                    <td class="p-3.5">
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold ${
                            l.status === 'Approved' ? 'bg-emerald-100 text-emerald-800' :
                            l.status === 'Rejected' ? 'bg-rose-100 text-rose-800' : 'bg-amber-100 text-amber-800'
                        }">${l.status}</span>
                    </td>
                    <td class="p-3.5 text-center">
                        ${isHRorAdmin && l.status === 'Pending' ? `
                            <div class="flex items-center justify-center gap-1">
                                <button onclick="updateLeaveStatus('${l.id}', 'Approved')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-2 py-1 rounded text-[11px]">Approve</button>
                                <button onclick="updateLeaveStatus('${l.id}', 'Rejected')" class="bg-rose-600 hover:bg-rose-700 text-white font-bold px-2 py-1 rounded text-[11px]">Reject</button>
                            </div>
                        ` : '<span class="text-slate-400">-</span>'}
                    </td>
                </tr>
            `).join('');

            const pendingCount = state.leaves.filter(l => l.status === 'Pending').length;
            document.getElementById('badge-pending-leaves').innerText = pendingCount;
        }

        function handleApplyLeave(e) {
            e.preventDefault();
            const newLeave = {
                id: 'LV-' + Math.floor(700 + Math.random() * 200),
                empId: currentUser.id,
                empName: currentUser.name,
                leaveType: document.getElementById('l_type').value,
                startDate: document.getElementById('l_start').value,
                endDate: document.getElementById('l_end').value,
                reason: document.getElementById('l_reason').value,
                status: 'Pending',
                appliedOn: new Date().toISOString().split('T')[0]
            };

            state.leaves.unshift(newLeave);

            if (useCloudSync && db) {
                db.collection('leaves').doc(newLeave.id).set(newLeave);
            }

            saveState();
            renderESS();
            closeModal('applyLeaveModal');
            showToast(`Leave application (${newLeave.id}) submitted to HR!`);
        }

        function updateLeaveStatus(leaveId, status) {
            const leave = state.leaves.find(l => l.id === leaveId);
            if (leave) {
                leave.status = status;
                if (useCloudSync && db) {
                    db.collection('leaves').doc(leaveId).update({ status: status });
                }
                saveState();
                renderESS();
                showToast(`Leave application ${leaveId} marked as ${status}`);
            }
        }

        function processPayroll() {
            showToast('July 2026 Payroll for Friendship Express Pvt Ltd successfully processed & posted to Accounting Ledger!');
        }

        function saveState() {
            localStorage.setItem('friendship_express_erp_v5', JSON.stringify(state));
            updateBadges();
        }

        function updateBadges() {
            const activeTrips = state.trips.filter(t => t.status === 'In Transit').length;
            document.getElementById('badge-active-trips').innerText = activeTrips;
            document.getElementById('badge-total-fleet').innerText = state.vehicles.length;
            document.getElementById('badge-total-customers').innerText = state.customers.length;
            document.getElementById('badge-pending-leaves').innerText = state.leaves.filter(l => l.status === 'Pending').length;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-slate-800', 'text-white', 'border-r-4', 'border-amber-500');
            });

            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            const activeNav = document.getElementById(`nav-${tabId}`);
            if (activeNav) {
                activeNav.classList.add('bg-slate-800', 'text-white', 'border-r-4', 'border-amber-500');
            }

            document.getElementById('sidebar').classList.add('-translate-x-full');
            if (tabId === 'dashboard') initDashboardCharts();
            if (tabId === 'ess') renderESS();
        }

        function openSearchModal() { openModal('searchModal'); document.getElementById('globalSearchInput').focus(); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    </script>
</body>
